name: pr-title

# Validates that PR titles follow Conventional Commits. The PR title
# becomes the squash-merge commit message on main, which is what
# release-please reads to compute version bumps and generate the
# changelog. Wrong title here means wrong changelog, so we gate on it.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
          scopes: |
            atomio
            editor_core
            language
            ai
            ext_host_node
            workspace
            theme
            sdk-ts
            docs
            ci
            release
            dev-practices
          requireScope: false
          subjectPattern: ^(?![A-Z])(?!.*\.$).+$
          subjectPatternError: >
            The subject must start with lowercase and must not end with
            a period.
