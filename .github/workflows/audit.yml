name: audit

on:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit
