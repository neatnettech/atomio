name: Feature request
description: Suggest a new capability
labels: ["type:feat"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing pain, not the proposed solution.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: roadmap
    attributes:
      label: Roadmap check
      description: Before submitting, please confirm.
      options:
        - label: I checked `docs/ROADMAP.md` and this isn't on the won't-do list
          required: true
        - label: I checked existing issues for duplicates
          required: true
