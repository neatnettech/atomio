name: Bug report
description: Something in atomio is broken
labels: ["type:bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open atomio
        2. ...
        3. Observe crash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: atomio version
      placeholder: "v0.0.0 or commit sha"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: macOS version & hardware
      placeholder: "macOS 14.4, M2 Pro"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
